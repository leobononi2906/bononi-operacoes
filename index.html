<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operações — Bononi</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #242736;
    --border: #2e3147;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --primary: #6366f1;
    --primary-hover: #4f52d4;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --info: #3b82f6;
    --purple: #8b5cf6;
    --cyan: #06b6d4;
    --gray: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 1rem;
  }
  .login-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 2.5rem; width: 100%; max-width: 380px;
  }
  .login-logo { text-align: center; margin-bottom: 2rem; }
  .login-logo .logo-icon { font-size: 2.5rem; }
  .login-logo h1 { font-size: 1.4rem; font-weight: 700; margin-top: 0.5rem; }
  .login-logo p { color: var(--text2); font-size: 0.85rem; margin-top: 0.25rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 0.4rem; font-weight: 500; }
  .form-group input {
    width: 100%; padding: 0.65rem 0.9rem; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 8px; color: var(--text);
    font-size: 0.9rem; outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--primary); }
  .btn { padding: 0.65rem 1.2rem; border-radius: 8px; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; }
  .btn-primary { background: var(--primary); color: #fff; width: 100%; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .login-error { background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3); color: #f87171; padding: 0.65rem 0.9rem; border-radius: 8px; font-size: 0.82rem; margin-bottom: 1rem; display: none; }

  /* APP SHELL */
  #app-shell { display: none; }
  .layout { display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: 220px; min-width: 220px; background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 1rem 0;
  }
  .sidebar-logo {
    padding: 0.5rem 1.2rem 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 0.75rem;
  }
  .sidebar-logo .app-title { font-size: 0.95rem; font-weight: 700; }
  .sidebar-logo .app-sub { font-size: 0.72rem; color: var(--text2); margin-top: 2px; }
  .nav-section { padding: 0 0.75rem; margin-bottom: 0.25rem; }
  .nav-section-label { font-size: 0.65rem; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .08em; padding: 0 0.5rem; margin: 0.75rem 0 0.35rem; }
  .nav-item {
    display: flex; align-items: center; gap: 0.6rem; padding: 0.55rem 0.75rem;
    border-radius: 8px; cursor: pointer; font-size: 0.83rem; color: var(--text2);
    transition: all 0.15s; margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: rgba(99,102,241,.15); color: var(--primary); font-weight: 600; }
  .nav-item .nav-icon { font-size: 1rem; width: 18px; text-align: center; }
  .sidebar-footer {
    margin-top: auto; padding: 1rem; border-top: 1px solid var(--border);
    font-size: 0.75rem; color: var(--text2);
  }
  .sidebar-footer .user-name { font-weight: 600; color: var(--text); font-size: 0.82rem; }
  .btn-logout {
    margin-top: 0.5rem; padding: 0.4rem 0.75rem; background: none;
    border: 1px solid var(--border); border-radius: 6px; color: var(--text2);
    cursor: pointer; font-size: 0.75rem; width: 100%; transition: all 0.15s;
  }
  .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0.85rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-title { font-size: 1rem; font-weight: 600; }
  .topbar-actions { display: flex; gap: 0.5rem; align-items: center; }
  .content { flex: 1; overflow-y: auto; padding: 1.5rem; }

  /* CARDS KPI */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .kpi-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 1.1rem 1.2rem;
  }
  .kpi-label { font-size: 0.72rem; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }
  .kpi-value { font-size: 1.8rem; font-weight: 700; margin: 0.3rem 0 0.15rem; }
  .kpi-sub { font-size: 0.75rem; color: var(--text2); }

  /* TABLE */
  .table-wrapper { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .table-header { padding: 1rem 1.2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; }
  .table-header h3 { font-size: 0.9rem; font-weight: 600; }
  .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .filter-input {
    padding: 0.4rem 0.75rem; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 0.8rem; outline: none; min-width: 160px;
  }
  .filter-input:focus { border-color: var(--primary); }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 0.65rem 1rem; text-align: left; font-size: 0.72rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); background: var(--bg3); }
  td { padding: 0.75rem 1rem; font-size: 0.82rem; border-bottom: 1px solid rgba(46,49,71,.5); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }
  .clickable { cursor: pointer; }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.25rem 0.6rem; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }

  /* SLA BADGE */
  .sla-ok     { background: rgba(16,185,129,.15); color: #34d399; }
  .sla-atencao{ background: rgba(245,158,11,.15); color: #fbbf24; }
  .sla-vencido{ background: rgba(239,68,68,.15);  color: #f87171; }
  .sla-concluido{ background: rgba(107,114,128,.15); color: #9ca3af; }
  .sla-sem_sla{ background: rgba(107,114,128,.1); color: #6b7280; }

  /* BOTÕES */
  .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.78rem; }
  .btn-outline { background: none; border: 1px solid var(--border); color: var(--text2); }
  .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { opacity: 0.85; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { opacity: 0.85; }

  /* DRAWER */
  .drawer-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100;
    display: none; align-items: stretch; justify-content: flex-end;
  }
  .drawer-overlay.open { display: flex; }
  .drawer {
    width: 100%; max-width: 780px; background: var(--bg2); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .drawer-header {
    padding: 1.2rem 1.4rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .drawer-header h3 { font-size: 0.95rem; font-weight: 600; }
  .drawer-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 1.2rem; padding: 0.2rem; }
  .drawer-close:hover { color: var(--text); }
  .drawer-body { flex: 1; overflow-y: auto; padding: 1.2rem 1.4rem; }
  .drawer-footer { padding: 1rem 1.4rem; border-top: 1px solid var(--border); display: flex; gap: 0.5rem; justify-content: flex-end; }

  /* FORM DRAWER */
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .field-full { margin-bottom: 1rem; }
  .field-label { font-size: 0.75rem; color: var(--text2); font-weight: 500; margin-bottom: 0.35rem; display: block; }
  .field-input, .field-select, .field-textarea {
    width: 100%; padding: 0.55rem 0.8rem; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 7px; color: var(--text);
    font-size: 0.84rem; outline: none; transition: border-color 0.2s;
  }
  .field-input:focus, .field-select:focus, .field-textarea:focus { border-color: var(--primary); }
  .field-textarea { resize: vertical; min-height: 80px; font-family: inherit; }
  .field-select option { background: var(--bg3); }

  /* SEÇÃO FOLLOW-UPS */
  .followup-list { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1rem; }
  .followup-item {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 0.85rem;
  }
  .followup-meta { font-size: 0.72rem; color: var(--text2); margin-bottom: 0.35rem; display: flex; gap: 0.5rem; align-items: center; }
  .followup-meta strong { color: var(--text); }
  .followup-texto { font-size: 0.82rem; }
  .tipo-badge-cobranca_transp { color: #fbbf24; }
  .tipo-badge-contato_cliente { color: #60a5fa; }
  .tipo-badge-resolucao       { color: #34d399; }
  .tipo-badge-interno         { color: #a78bfa; }
  .tipo-badge-de_assistencia  { color: #f472b6; }

  /* TEMPLATE PILLS */
  .templates-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.75rem; }
  .template-pill {
    padding: 0.25rem 0.65rem; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; font-size: 0.73rem; cursor: pointer; color: var(--text2); transition: all 0.15s;
  }
  .template-pill:hover { border-color: var(--primary); color: var(--primary); }

  /* CONFIG CARDS */
  .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1rem; }
  .config-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem; }
  .config-card h4 { font-size: 0.88rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .config-row { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid rgba(46,49,71,.5); }
  .config-row:last-child { border-bottom: none; }
  .config-row-label { font-size: 0.82rem; }
  .config-row-sub { font-size: 0.72rem; color: var(--text2); margin-top: 2px; }
  .config-row-actions { display: flex; gap: 0.35rem; align-items: center; }

  /* ADD ROW */
  .add-row { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
  .add-row input { flex: 1; }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .tab-btn { padding: 0.65rem 1.1rem; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text2); cursor: pointer; font-size: 0.83rem; font-weight: 500; transition: all 0.15s; margin-bottom: -1px; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text2); }
  .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .empty-state p { font-size: 0.88rem; }

  /* LOADING */
  .loading { text-align: center; padding: 2rem; color: var(--text2); font-size: 0.85rem; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 0.5rem; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
  .toast { padding: 0.75rem 1.1rem; border-radius: 8px; font-size: 0.82rem; font-weight: 500; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; max-width: 320px; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast-success { background: rgba(16,185,129,.2); border: 1px solid rgba(16,185,129,.4); color: #34d399; }
  .toast-error   { background: rgba(239,68,68,.2); border: 1px solid rgba(239,68,68,.4); color: #f87171; }
  .toast-info    { background: rgba(99,102,241,.2); border: 1px solid rgba(99,102,241,.4); color: #818cf8; }

  /* AUDITORIA */
  .divergencia-positiva { color: #f87171; font-weight: 600; }
  .divergencia-negativa { color: #34d399; font-weight: 600; }


  /* INLINE STATUS POPUP */
  .status-popup {
    position: absolute; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; z-index: 200; min-width: 180px; padding: 0.4rem 0;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
  }
  .status-popup-item {
    padding: 0.5rem 0.9rem; cursor: pointer; font-size: 0.8rem;
    display: flex; align-items: center; gap: 0.5rem; transition: background 0.1s;
  }
  .status-popup-item:hover { background: var(--bg2); }
  .status-popup-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* QUICK FOLLOW-UP POPUP */
  .qfw-popup {
    position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 300;
    display: flex; align-items: center; justify-content: center; padding: 1rem;
  }
  .qfw-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    width: 100%; max-width: 480px; padding: 1.4rem;
  }
  .qfw-card h4 { font-size: .9rem; font-weight: 600; margin-bottom: 1rem; }

  /* RASTREIO CARD */
  .rastreio-card {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.85rem 1rem; margin-top: 1rem;
  }
  .rastreio-status-ok      { color: #34d399; }
  .rastreio-status-atraso  { color: #f87171; }
  .rastreio-status-transito{ color: #60a5fa; }
  .rastreio-status-sem_info{ color: #6b7280; }

  /* DETAIL GRID 2 col no drawer */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem 1.5rem; margin-bottom: 1rem; }
  .detail-item .detail-label { font-size: .72rem; color: var(--text2); font-weight: 500; margin-bottom: .2rem; }
  .detail-item .detail-val   { font-size: .85rem; }

  /* SELECT inline no detalhe */
  .inline-select {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: .82rem; padding: .3rem .6rem; outline: none; cursor: pointer;
  }
  .inline-select:focus { border-color: var(--primary); }

  /* MOBILE */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .field-row { grid-template-columns: 1fr; }
    .drawer { max-width: 100%; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🚚</div>
      <h1>Operações</h1>
      <p>Bononi Acessórios</p>
    </div>
    <div id="login-error" class="login-error"></div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="btn-login" onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<!-- APP SHELL -->
<div id="app-shell">
  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="app-title">🚚 Operações</div>
        <div class="app-sub">Bononi Acessórios</div>
      </div>
      <nav class="nav-section">
        <div class="nav-section-label">Principal</div>
        <div class="nav-item active" onclick="navegar('tickets')" id="nav-tickets">
          <span class="nav-icon">🎫</span> Tickets
        </div>
        <div class="nav-item" onclick="navegar('auditoria')" id="nav-auditoria">
          <span class="nav-icon">🔍</span> Auditoria Frete
        </div>

        <div class="nav-section-label">Configurações</div>
        <div class="nav-item" onclick="navegar('config')" id="nav-config">
          <span class="nav-icon">⚙️</span> Configurações
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-name" id="sidebar-user">—</div>
        <div style="color:var(--text2);font-size:.72rem;margin-top:2px" id="sidebar-role">—</div>
        <button class="btn-logout" onclick="fazerLogout()">Sair</button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="topbar">
        <span class="topbar-title" id="topbar-title">Tickets</span>
        <div class="topbar-actions" id="topbar-actions"></div>
      </div>
      <div class="content" id="main-content">
        <div class="loading"><span class="spinner"></span> Carregando...</div>
      </div>
    </main>
  </div>
</div>

<!-- DRAWER TICKET -->
<div class="drawer-overlay" id="drawer-overlay" onclick="fecharDrawer(event)">
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <h3 id="drawer-title">Ticket</h3>
      <button class="drawer-close" onclick="fecharDrawerDireto()">✕</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
    <div class="drawer-footer" id="drawer-footer"></div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toast-container"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SUPA_URL = 'https://vishxwdxqiygbxmtpfoy.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpc2h4d2R4cWl5Z2J4bXRwZm95Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Njg2MjIsImV4cCI6MjA4ODA0NDYyMn0.J647m3ieDHahNQYBWMRESl0aPFXsT_zt_7ZcDvyB-SA';
const MODULO = 'operacoes';

const sb = supabase.createClient(SUPA_URL, SUPA_KEY);
let currentUser = null;
let currentSession = null;
let paginaAtual = 'tickets';

// Cache de lookups
let _tipos = [], _status = [], _prioridades = [], _transportadoras = [], _templates = [], _configs = {};

// ============================================================
// AUTH
// ============================================================
async function iniciar() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { mostrarLogin(); return; }
  const meta = session.user.user_metadata || {};
  const temAcesso = meta.admin === true || (meta.modulos || []).includes(MODULO);
  if (!temAcesso) { window.location.href = 'https://bononi-hub.vercel.app/'; return; }
  currentSession = session;
  currentUser = { nome: meta.nome || session.user.email, admin: meta.admin, meta };
  document.getElementById('sidebar-user').textContent = currentUser.nome;
  document.getElementById('sidebar-role').textContent = currentUser.admin ? 'Admin' : 'Operador';
  mostrarApp();
  await carregarLookups();
  navegar('tickets');
}

function mostrarLogin() { document.getElementById('login-screen').style.display='flex'; document.getElementById('app-shell').style.display='none'; }
function mostrarApp()   { document.getElementById('login-screen').style.display='none'; document.getElementById('app-shell').style.display='block'; }

async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('btn-login');
  const err   = document.getElementById('login-error');
  err.style.display='none';
  btn.disabled=true; btn.textContent='Entrando...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { err.textContent=error.message; err.style.display='block'; btn.disabled=false; btn.textContent='Entrar'; return; }
  const meta = data.user?.user_metadata || {};
  const temAcesso = meta.admin===true || (meta.modulos||[]).includes(MODULO);
  if (!temAcesso) { err.textContent='Você não tem acesso ao módulo Operações.'; err.style.display='block'; await sb.auth.signOut(); btn.disabled=false; btn.textContent='Entrar'; return; }
  await iniciar();
}

async function fazerLogout() { await sb.auth.signOut(); window.location.reload(); }

document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') fazerLogin(); });

// ============================================================
// LOOKUPS
// ============================================================
async function carregarLookups() {
  const [tipos, status, prios, transp, templates, cfgs] = await Promise.all([
    supa('ops_tipos','order=ordem&ativo=eq.true'),
    supa('ops_status','order=ordem&ativo=eq.true'),
    supa('ops_prioridades','order=ordem&ativo=eq.true'),
    supa('ops_transportadoras','order=nome&ativo=eq.true'),
    supa('ops_templates_followup','order=ordem&ativo=eq.true'),
    supa('ops_configuracoes',''),
  ]);
  _tipos = tipos || []; _status = status || []; _prioridades = prios || [];
  _transportadoras = transp || []; _templates = templates || [];
  (_configs = {}); (cfgs||[]).forEach(c => _configs[c.chave] = c.valor);
}

// ============================================================
// HTTP helper
// ============================================================
async function supa(tabela, query, method='GET', body=null) {
  const url = `${SUPA_URL}/rest/v1/${tabela}?${query}&limit=9999`;
  const opts = {
    method, headers: {
      'Content-Type':'application/json', apikey: SUPA_KEY,
      Authorization: 'Bearer ' + (currentSession?.access_token || SUPA_KEY),
      Prefer: method==='POST' ? 'return=representation' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok) { const t=await r.text(); throw new Error(t); }
  return r.status===204 ? null : r.json();
}

async function supaPost(tabela, body) {
  const url = `${SUPA_URL}/rest/v1/${tabela}`;
  const r = await fetch(url, {
    method:'POST', headers:{ 'Content-Type':'application/json', apikey:SUPA_KEY,
      Authorization:'Bearer '+(currentSession?.access_token||SUPA_KEY), Prefer:'return=representation' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function supaPatch(tabela, id, body) {
  const url = `${SUPA_URL}/rest/v1/${tabela}?id=eq.${id}`;
  const r = await fetch(url, {
    method:'PATCH', headers:{ 'Content-Type':'application/json', apikey:SUPA_KEY,
      Authorization:'Bearer '+(currentSession?.access_token||SUPA_KEY), Prefer:'return=representation' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function supaDelete(tabela, id) {
  const url = `${SUPA_URL}/rest/v1/${tabela}?id=eq.${id}`;
  await fetch(url, { method:'DELETE', headers:{ apikey:SUPA_KEY, Authorization:'Bearer '+(currentSession?.access_token||SUPA_KEY) } });
}

let ticketsFiltro = { status:'', tipo:'', responsavel:'', busca:'', mostrarConcluidos: false };

let sortCol = 'criado_em', sortDir = 'desc';

async function renderTickets() {
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary btn-sm" onclick="abrirNovoTicket()">+ Novo Ticket</button>`;
  document.getElementById('main-content').innerHTML = `<div class="loading"><span class="spinner"></span> Carregando tickets...</div>`;

  // Auto-cria tickets de atraso em background (silencioso, deduplicado pela view)
  criarTicketsAtrasoAuto().catch(e => console.warn('Auto-atraso:', e));

  todosTickets = await supa('ops_tickets_view', 'order=criado_em.desc');
  renderListaTickets();
}

async function criarTicketsAtrasoAuto() {
  const diasMin = parseInt(_configs['dias_atraso_entrega']||10);
  const autoAtivo = _configs['auto_ticket_atraso_entrega'] !== 'false';
  if (!autoAtivo) return;

  const tipoId = _tipos.find(t=>t.nome.includes('Atraso'))?.id;
  const statusId = _status.find(s=>s.nome==='Pendente')?.id;
  const prioId   = _prioridades.find(p=>p.nome==='Normal')?.id;
  if (!tipoId || !statusId) return;

  const atrasos = await supa('ops_entregas_atrasadas', `dias_desde_faturamento=gte.${diasMin}&order=dias_desde_faturamento.desc`);
  if (!atrasos?.length) return;

  // Cria em batch de até 50 por vez para não travar
  const lote = atrasos.slice(0, 50);
  const inserts = lote.map(d => ({
    tipo_id:          tipoId,
    status_id:        statusId,
    prioridade_id:    d.dias_desde_faturamento > 30 ? (_prioridades.find(p=>p.nome==='Alta')?.id || prioId) : prioId,
    responsavel_nome: currentUser.nome,
    cliente:          d.nome_cliente || null,
    codigo_cliente:   String(d.id_cliente || ''),
    nf:               d.num_nf || null,
    transportadora_nome: d.nome_transportadora || null,
    origem_tipo:      'frt_conhecimentos',
    origem_id:        String(d.id_doc || ''),
    observacao:       `Entrega atrasada ${d.dias_desde_faturamento} dias. NF ${d.num_nf} emitida em ${d.data_faturamento}.`,
    criado_por:       'sistema',
  }));

  // Insere via POST em batch
  await fetch(`${SUPA_URL}/rest/v1/ops_tickets`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      apikey: SUPA_KEY,
      Authorization: 'Bearer ' + (currentSession?.access_token || SUPA_KEY),
      Prefer: 'return=minimal'
    },
    body: JSON.stringify(inserts)
  });

  // Recarrega lista depois de criar
  todosTickets = await supa('ops_tickets_view', 'order=criado_em.desc');
  renderListaTickets();
}

function sortTickets(lista) {
  return [...lista].sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (va == null) va = '';
    if (vb == null) vb = '';
    // Datas e números
    if (typeof va === 'number' || !isNaN(parseFloat(va))) {
      va = parseFloat(va)||0; vb = parseFloat(vb)||0;
    } else {
      va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
    }
    if (va < vb) return sortDir==='asc' ? -1 : 1;
    if (va > vb) return sortDir==='asc' ? 1 : -1;
    return 0;
  });
}

function setSort(col) {
  if (sortCol === col) sortDir = sortDir==='asc' ? 'desc' : 'asc';
  else { sortCol = col; sortDir = 'asc'; }
  renderListaTickets();
}

function thSort(col, label) {
  const arrow = sortCol===col ? (sortDir==='asc' ? ' ▲' : ' ▼') : '';
  return `<th onclick="setSort('${col}')" style="cursor:pointer;user-select:none" title="Ordenar por ${label}">${label}${arrow}</th>`;
}

  const atencao   = (todosTickets||[]).filter(t=>!t.concluido && t.sla_status==='atencao').length;
  const conclHoje = (todosTickets||[]).filter(t=>t.concluido && t.data_conclusao?.startsWith(new Date().toISOString().slice(0,10))).length;
  const totalConcluidos = (todosTickets||[]).filter(t=>t.concluido).length;

      <div class="kpi-card"><div class="kpi-label">SLA Vencido</div><div class="kpi-value" style="color:var(--danger)">${vencidos}</div></div>

        <div class="filters">
          <input class="filter-input" placeholder="Buscar..." value="${ticketsFiltro.busca}"
            oninput="ticketsFiltro.busca=this.value;renderListaTickets()">
          <select class="filter-input" onchange="ticketsFiltro.status=this.value;renderListaTickets()">

          <select class="filter-input" onchange="ticketsFiltro.tipo=this.value;renderListaTickets()">
            <option value="">Todos os tipos</option>${optTipos}
          </select>
        </div>
      </div>
      ${lista.length===0
        ? '<div class="empty-state"><div class="empty-icon">🎫</div><p>Nenhum ticket encontrado.</p></div>'
        : `<table>
        <thead>

function slaLabel(t) {
  if (t.sla_status==='concluido') return 'Concluído';
  if (t.sla_status==='sem_sla')   return 'Sem SLA';
  if (t.sla_status==='vencido')   return '⚠ Vencido';
  if (t.sla_status==='atencao')   return '⏰ Atenção';
  const h = parseFloat(t.sla_horas_restantes||0);
  if (h > 24) return Math.round(h/24)+'d restantes';
  return Math.round(h)+'h restantes';
}

        <label class="field-label">Observação</label>

// RASTREIO AUTOMÁTICO
// ============================================================
async function buscarRastreioTicket(ticketId, nf) {
  const box = document.getElementById('rastreio-box-' + ticketId);
  if (!box) return;
  try {
    const dados = await supa('frt_rastreio',
      `num_nf=eq.${encodeURIComponent(nf)}&order=atualizado_em.desc&limit=1`);
    const r = dados?.[0];
    if (!r) {
      box.innerHTML = '<div class="rastreio-card"><span style="color:var(--text2);font-size:.8rem">Nenhum rastreio encontrado para NF ' + nf + '</span></div>';
      return;
    }
    const statusCls = r.status === 'entregue' ? 'rastreio-status-ok'
      : r.status === 'em_transito' ? 'rastreio-status-transito'
      : r.status === 'sem_info'    ? 'rastreio-status-sem_info'
      : 'rastreio-status-atraso';
    const statusLabel = {
      entregue: '✅ Entregue', em_transito: '🚚 Em trânsito',
      sem_info: '❓ Sem informação', atrasado: '⚠️ Atrasado'
    }[r.status] || r.status;
    const atualizado = r.atualizado_em
      ? new Date(r.atualizado_em).toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})
      : '—';
    const previsao = r.data_previsao
      ? new Date(r.data_previsao + 'T00:00:00').toLocaleDateString('pt-BR') : '—';
    const entregue = r.data_entrega
      ? new Date(r.data_entrega + 'T00:00:00').toLocaleDateString('pt-BR') : null;
    box.innerHTML = `
      <div class="rastreio-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
          <span class="${statusCls}" style="font-weight:600;font-size:.85rem">${statusLabel}</span>
          <span style="font-size:.7rem;color:var(--text2)">atualizado ${atualizado}</span>
        </div>
        ${r.ultima_ocorrencia || r.ultimo_evento
          ? `<div style="font-size:.82rem;margin-bottom:.4rem">${r.ultima_ocorrencia || r.ultimo_evento}</div>` : ''}
        <div style="display:flex;gap:1.5rem;font-size:.75rem;color:var(--text2)">
          <span>Prev. entrega: <strong style="color:var(--text)">${previsao}</strong></span>
          ${entregue ? `<span>Entregue em: <strong style="color:#34d399">${entregue}</strong></span>` : ''}
          <span>${r.nome_transportadora||''}</span>
        </div>
      </div>`;
  } catch(e) {
    box.innerHTML = '<div class="rastreio-card" style="color:var(--text2);font-size:.8rem">Erro ao buscar rastreio.</div>';
  }
}

// Salva campo individual do ticket sem abrir edição completa
async function salvarCampoRapido(ticketId, campo, valor) {
  try {
    const body = {};
    body[campo] = valor ? (campo.endsWith('_id') ? parseInt(valor) : valor) : null;
    await supaPatch('ops_tickets', ticketId, body);
    // Atualiza cache local
    const t = todosTickets.find(x => x.id === ticketId);
    if (t) {
      t[campo] = body[campo];
      if (campo === 'status_id') {
        const s = _status.find(s => s.id == valor);
        if (s) { t.status_nome = s.nome; t.status_cor = s.cor; }
      }
      if (campo === 'prioridade_id') {
        const p = _prioridades.find(p => p.id == valor);
        if (p) { t.prioridade_nome = p.nome; t.prioridade_cor = p.cor; }
      }
    }
    toast('Salvo!', 'success');
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

// PÁGINA: AUDITORIA DE FRETE
// ============================================================
async function renderAuditoria() {
  document.getElementById('topbar-actions').innerHTML = '';
  document.getElementById('main-content').innerHTML =
    '<div class="loading"><span class="spinner"></span> Carregando auditoria...</div>';

  const minDiv = parseFloat(_configs['auditoria_divergencia_min'] || 50);
  // Mês padrão = mês atual
  const hoje = new Date();
  const mesAtual = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}`;
  window._audMesFiltro = window._audMesFiltro || mesAtual;
  const mesInicio = window._audMesFiltro + '-01';
  // Último dia do mês
  const [ano, mes] = window._audMesFiltro.split('-').map(Number);
  const mesFim = new Date(ano, mes, 0).toISOString().slice(0,10);
  const dados  = await supa('ops_auditoria_frete',
    `divergencia=gte.${minDiv}&data_emissao=gte.${mesInicio}&data_emissao=lte.${mesFim}&order=divergencia.desc`);
  window._dadosAuditoria = dados || [];

  if (!dados || dados.length === 0) {
    document.getElementById('main-content').innerHTML =
      `<div class="empty-state"><div class="empty-icon">✅</div>
       <p>Nenhuma divergência acima de R$ ${minDiv.toFixed(2)}.</p>
       <p style="margin-top:.5rem"><a href="#" onclick="navegar('config')" style="color:var(--primary)">Alterar valor mínimo em Configurações</a></p>
       </div>`;
    return;
  }

  const totalDiv = dados.reduce((s, d) => s + parseFloat(d.divergencia || 0), 0);
  const pendentes   = dados.filter(d => d.status_auditoria === 'pendente').length;
  const divergentes = dados.filter(d => d.status_auditoria === 'divergencia').length;
  const contestados = dados.filter(d => d.status_auditoria === 'contestado').length;

  const statusCores = {
    pendente:    { bg: 'rgba(245,158,11,.15)',  cor: '#fbbf24' },
    divergencia: { bg: 'rgba(239,68,68,.15)',   cor: '#f87171' },
    contestado:  { bg: 'rgba(139,92,246,.15)',  cor: '#a78bfa' },
    sem_vinculo: { bg: 'rgba(107,114,128,.15)', cor: '#9ca3af' },
  };

  document.getElementById('main-content').innerHTML = `
    <div class="kpi-grid" style="margin-bottom:1rem">
      <div class="kpi-card"><div class="kpi-label">Divergências</div>
        <div class="kpi-value" style="color:var(--danger)">${dados.length}</div></div>
      <div class="kpi-card"><div class="kpi-label">Total R$</div>
        <div class="kpi-value" style="color:var(--warning);font-size:1.2rem">
          R$ ${totalDiv.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
      <div class="kpi-card"><div class="kpi-label">Pendentes</div>
        <div class="kpi-value" style="color:#fbbf24">${pendentes}</div></div>
      <div class="kpi-card"><div class="kpi-label">Contestados</div>
        <div class="kpi-value" style="color:#a78bfa">${contestados}</div></div>
    </div>
    <div class="table-wrapper">
      <div class="table-header">
        <h3>Auditoria de Frete (${dados.length})</h3>
        <div class="filters">
          <select class="filter-input" id="filt-aud-mes" onchange="trocarMesAuditoria(this.value)" style="min-width:130px">
            ${gerarOpsMeses()}
          </select>
          <input class="filter-input" id="filt-aud" placeholder="Buscar transp. / destinatário / NF..."
            oninput="filtrarAuditoria(this.value)" style="min-width:200px">
          <select class="filter-input" id="filt-aud-status" onchange="filtrarAuditoria(document.getElementById('filt-aud').value)">
            <option value="">Todos os status</option>
            <option value="pendente">Pendente</option>
            <option value="divergencia">Divergência</option>
            <option value="contestado">Contestado</option>
            <option value="sem_vinculo">Sem vínculo</option>
          </select>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>N° CTe</th><th>Data</th><th>Transportadora</th>
            <th>Destinatário</th><th>UF</th><th>NF</th>
            <th>Valor Produtos</th><th>Valor CTe</th><th>Valor NF</th>
            <th>Divergência</th><th>Status</th><th>Vendedor</th>
          </tr>
        </thead>
        <tbody id="tbody-auditoria">
          ${renderLinhasAuditoria(dados, statusCores)}
        </tbody>
      </table>
    </div>`;
  window._statusCoresAuditoria = statusCores;
}

function gerarOpsMeses() {
  const hoje = new Date();
  const mesAtual = window._audMesFiltro || `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}`;
  let opts = '';
  for (let i = 0; i < 12; i++) {
    const d = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
    const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const lbl = d.toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
    opts += `<option value="${val}" ${val===mesAtual?'selected':''}>${lbl}</option>`;
  }
  return opts;
}

async function trocarMesAuditoria(mes) {
  window._audMesFiltro = mes;
  await renderAuditoria();
}

function renderLinhasAuditoria(dados, statusCores) {
  const sc = statusCores || window._statusCoresAuditoria || {};
  return dados.map(d => {
    const nf   = d.num_nf || (d.notas_fiscais ? (d.notas_fiscais[0]?.num_nf || '—') : '—');
    const cor  = (sc[d.status_auditoria] || {}).cor || '#9ca3af';
    const bg   = (sc[d.status_auditoria] || {}).bg  || 'rgba(107,114,128,.1)';
    const div  = parseFloat(d.divergencia || 0);
    return `<tr class="clickable" onclick="abrirDrawerAuditoria(${d.id})">
      <td style="font-family:monospace;font-weight:600;color:var(--primary)">${d.num_cte || '—'}</td>
      <td style="white-space:nowrap">${d.data_emissao ? new Date(d.data_emissao+'T00:00:00').toLocaleDateString('pt-BR') : '—'}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d.nome_transportadora||''}">${d.nome_transportadora||'—'}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d.nome_destinatario||''}">${d.nome_destinatario||'—'}</td>
      <td>${d.uf_destino||'—'}</td>
      <td style="font-family:monospace">${nf}</td>
      <td>R$ ${(parseFloat(d.valor_mercadoria||0)).toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
      <td>R$ ${(parseFloat(d.valor_frete_cte||0)).toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
      <td>R$ ${(parseFloat(d.valor_frete_nf||0)).toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
      <td style="font-weight:700;color:${div>0?'var(--danger)':'var(--success)'}">
        ${div>0?'+':''}R$ ${Math.abs(div).toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
      <td><span class="badge" style="background:${bg};color:${cor}">${d.status_auditoria||'—'}</span></td>
      <td style="font-size:.75rem;color:var(--text2)">${d.nome_vendedor||'—'}</td>
    </tr>`;
  }).join('');
}

function filtrarAuditoria(q) {
  const statusF = document.getElementById('filt-aud-status')?.value || '';
  let lista = window._dadosAuditoria || [];
  if (q) lista = lista.filter(d =>
    (d.nome_transportadora+d.nome_destinatario+(d.num_nf||'')).toLowerCase().includes(q.toLowerCase()));
  if (statusF) lista = lista.filter(d => d.status_auditoria === statusF);
  document.getElementById('tbody-auditoria').innerHTML = renderLinhasAuditoria(lista);
}

      <div class="detail-item"><div class="detail-label">Data Emissão</div>
        <div class="detail-val">${d.data_emissao?new Date(d.data_emissao+'T00:00:00').toLocaleDateString('pt-BR'):'—'}</div></div>
      <div class="detail-item"><div class="detail-label">Transportadora</div>
        <div class="detail-val">${d.nome_transportadora||'—'}</div></div>
      <div class="detail-item"><div class="detail-label">NF</div>
        <div class="detail-val" style="font-family:monospace">${nf}</div></div>
      <div class="detail-item"><div class="detail-label">Destinatário</div>
        <div class="detail-val">${d.nome_destinatario||'—'}</div></div>
      <div class="detail-item"><div class="detail-label">Destino</div>
        <div class="detail-val">${d.cidade_destino||''} ${d.uf_destino||''}</div></div>
      <div class="detail-item"><div class="detail-label">Valor Produtos</div>
        <div class="detail-val">R$ ${parseFloat(d.valor_mercadoria||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
      <div class="detail-item"><div class="detail-label">Peso</div>
        <div class="detail-val">${d.peso_kg?parseFloat(d.peso_kg).toFixed(2)+' kg':'—'}</div></div>
    </div>

    <!-- Valores frete -->
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:1.25rem">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;text-align:center">
        <div><div class="field-label">Valor NF</div>
          <div style="font-size:1.1rem;font-weight:600">R$ ${parseFloat(d.valor_frete_nf||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
        <div><div class="field-label">Valor CTe</div>
          <div style="font-size:1.1rem;font-weight:600">R$ ${parseFloat(d.valor_frete_cte||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
        <div><div class="field-label">Divergência</div>
          <div style="font-size:1.2rem;font-weight:700;color:${div>0?'var(--danger)':'var(--success)'}">
            ${div>0?'+':''}R$ ${Math.abs(div).toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
      </div>
      ${(d.valor_pedagio||d.valor_gris||d.valor_adicionais) ? `
      <hr style="border:none;border-top:1px solid var(--border);margin:.75rem 0">
      <div style="display:flex;gap:1.5rem;font-size:.78rem;color:var(--text2);justify-content:center">
        ${d.valor_pedagio  ? `<span>Pedágio: R$ ${parseFloat(d.valor_pedagio).toFixed(2)}</span>` : ''}
        ${d.valor_gris     ? `<span>GRIS: R$ ${parseFloat(d.valor_gris).toFixed(2)}</span>` : ''}
        ${d.valor_adicionais ? `<span>Adicionais: R$ ${parseFloat(d.valor_adicionais).toFixed(2)}</span>` : ''}
      </div>` : ''}
    </div>

    <!-- Observação -->
    <div class="field-full">
      <label class="field-label">Observação</label>
      <textarea class="field-textarea" id="aud-obs" placeholder="Notas sobre esta auditoria...">${d.observacao_auditoria||''}</textarea>
    </div>`;

  document.getElementById('drawer-footer').innerHTML =
    `<button class="btn btn-outline btn-sm" onclick="fecharDrawerDireto()">Fechar</button>
     <button class="btn btn-primary btn-sm" onclick="salvarAuditoria(${d.id}, document.getElementById('aud-status-sel').value)">Salvar</button>`;
}

async function salvarAuditoria(id, status) {
  const obs = document.getElementById('aud-obs')?.value || '';
  try {
    await fetch(`${SUPA_URL}/rest/v1/frt_conhecimentos?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json', apikey: SUPA_KEY,
        Authorization: 'Bearer ' + (currentSession?.access_token || SUPA_KEY)
      },
      body: JSON.stringify({ status_auditoria: status, observacao_auditoria: obs })
    });
    // Atualiza cache local
    const d = (window._dadosAuditoria || []).find(x => x.id === id);
    if (d) { d.status_auditoria = status; d.observacao_auditoria = obs; }
    // Se confirmou OK, remove da lista (view filtra status != ok)
    if (status === 'ok') {
      window._dadosAuditoria = (window._dadosAuditoria || []).filter(x => x.id !== id);
      fecharDrawerDireto();
    }
    toast('Auditoria salva!', 'success');
    filtrarAuditoria(document.getElementById('filt-aud')?.value || '');
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}
// ============================================================
// PÁGINA: ATRASOS DE ENTREGA
// ============================================================
async function renderAtrasos() {
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary btn-sm" onclick="renderAuditoria()">🔍 Auditoria Frete</button>
     <button class="btn btn-outline btn-sm" onclick="renderAtrasos()">📋 Ver Atrasos</button>`;
  document.getElementById('main-content').innerHTML = `<div class="loading"><span class="spinner"></span> Carregando entregas atrasadas...</div>`;

  const diasMin = parseInt(_configs['dias_atraso_entrega']||10);
  const dados = await supa('ops_entregas_atrasadas',
    `dias_desde_faturamento=gte.${diasMin}&order=dias_desde_faturamento.desc`);

  if (!dados || dados.length===0) {
    document.getElementById('main-content').innerHTML =
      `<div class="empty-state"><div class="empty-icon">✅</div><p>Nenhuma entrega atrasada encontrada.</p></div>`;
    return;
  }

  document.getElementById('main-content').innerHTML = `
    <div class="kpi-grid" style="margin-bottom:1rem">
      <div class="kpi-card"><div class="kpi-label">Em Atraso</div><div class="kpi-value" style="color:var(--danger)">${dados.length}</div></div>
      <div class="kpi-card"><div class="kpi-label">Critério</div><div class="kpi-value" style="font-size:1.2rem">> ${diasMin} dias</div>
        <div class="kpi-sub"><a href="#" onclick="navegar('config')" style="color:var(--primary)">Alterar em Config</a></div>
      </div>
      <div class="kpi-card"><div class="kpi-label">Mais Antigo</div>
        <div class="kpi-value" style="color:var(--warning);font-size:1.3rem">${dados[0]?.dias_desde_faturamento} dias</div>
      </div>
    </div>
    <div class="table-wrapper">
      <div class="table-header">
        <h3>Entregas Atrasadas (${dados.length})</h3>
        <div class="filters">
          <input class="filter-input" id="filt-atrasos" placeholder="Buscar cliente / NF..." oninput="filtrarAtrasos(this.value)">
        </div>
      </div>
      <table>
        <thead>
          <tr><th>NF</th><th>Cliente</th><th>Data Fat.</th><th>Dias</th><th>Transportadora</th><th>Valor</th><th>Empresa</th><th>Ação</th></tr>
        </thead>
        <tbody id="tbody-atrasos">
          ${renderLinhasAtrasos(dados)}
        </tbody>
      </table>
    </div>`;
  window._dadosAtrasos = dados;
}

function renderLinhasAtrasos(dados) {
  return dados.map(d=>`
    <tr>
      <td style="font-family:monospace;font-weight:600">${d.num_nf||'—'}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.nome_cliente||'—'}</td>
      <td>${d.data_faturamento?new Date(d.data_faturamento+'T00:00:00').toLocaleDateString('pt-BR'):'—'}</td>
      <td><span style="color:${d.dias_desde_faturamento>30?'var(--danger)':'var(--warning)'};font-weight:700">${d.dias_desde_faturamento}d</span></td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.nome_transportadora||'—'}</td>
      <td>R$ ${(d.faturamento_doc||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
      <td style="font-size:.75rem;color:var(--text2)">${d.empresa||''}</td>
      <td><button class="btn btn-outline btn-sm" onclick="abrirTicketDeAtraso(${JSON.stringify(d).replace(/"/g,'&quot;')})">🎫 Ticket</button></td>
    </tr>`).join('');
}

function filtrarAtrasos(q) {
  const dados = (window._dadosAtrasos||[]).filter(d =>
    !q || (d.nome_cliente+d.num_nf).toLowerCase().includes(q.toLowerCase()));
  document.getElementById('tbody-atrasos').innerHTML = renderLinhasAtrasos(dados);
}

function abrirTicketDeAtraso(d) {
  abrirNovoTicket();
  setTimeout(()=>{
    const tipoAtraso = _tipos.find(t=>t.nome.includes('Atraso'));
    if (tipoAtraso) document.getElementById('nt-tipo').value = tipoAtraso.id;
    document.getElementById('nt-cliente').value  = d.nome_cliente||'';
    document.getElementById('nt-cliente-id').value = d.id_cliente||'';
    document.getElementById('nt-nf').value       = d.num_nf||'';
    document.getElementById('nt-obs').value      = `NF ${d.num_nf} emitida em ${d.data_faturamento} — ${d.dias_desde_faturamento} dias sem entrega registrada.`;
    const tr = _transportadoras.find(t=>d.nome_transportadora?.toUpperCase().includes(t.nome.toUpperCase().split(' ')[0]));
    if (tr) document.getElementById('nt-transp').value = tr.id;
    document.getElementById('nt-origem').value    = 'frt_conhecimentos';
    document.getElementById('nt-origem-id').value = d.id_doc||'';
  }, 100);
}

// ============================================================
// STATUS POPUP INLINE
// ============================================================
let _statusPopupAberto = null;

function abrirStatusPopup(e, ticketId) {
  fecharStatusPopup();
  const badge = e.currentTarget;
  const rect  = badge.getBoundingClientRect();
  const popup = document.createElement('div');
  popup.className = 'status-popup';
  popup.id = 'status-popup-' + ticketId;
  popup.style.cssText = `top:${rect.bottom + window.scrollY + 4}px;left:${rect.left + window.scrollX}px;`;
  popup.innerHTML = _status.map((s,i) => `
    <div class="status-popup-item" onclick="alterarStatusInline(${ticketId},${s.id},${i})">
      <span class="status-popup-dot" style="background:${s.cor}"></span>
      ${s.nome}
    </div>`).join('');
  document.body.appendChild(popup);
  _statusPopupAberto = popup;
  setTimeout(() => document.addEventListener('click', fecharStatusPopup, {once:true}), 10);
}

function fecharStatusPopup() {
  if (_statusPopupAberto) { _statusPopupAberto.remove(); _statusPopupAberto = null; }
}

async function alterarStatusInline(ticketId, statusId, statusIdx) {
  const s = _status[statusIdx] || _status.find(x=>x.id==statusId) || {};
  const statusNome = s.nome || '';
  const statusCor  = s.cor  || '#6b7280';
  fecharStatusPopup();
  try {
    await supaPatch('ops_tickets', ticketId, { status_id: statusId });
    // Atualiza local sem recarregar tudo
    const t = todosTickets.find(x => x.id === ticketId);
    if (t) { t.status_id = statusId; t.status_nome = statusNome; t.status_cor = statusCor; }
    renderListaTickets();
    toast('Status atualizado!', 'success');
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
}

// ============================================================
// QUICK FOLLOW-UP POPUP
// ============================================================
function abrirQuickFollowup(ticketId) {
  const tk = todosTickets.find(x => x.id === ticketId) || {};
  const numero  = tk.numero_ticket || ('ID ' + ticketId);
  const cliente = tk.cliente || '';
  fecharQuickFollowup();
  const optTipoFw = ['interno','cobranca_transp','contato_cliente','resolucao']
    .map(x => `<option value="${x}">${x.replace(/_/g,' ')}</option>`).join('');
  const tplHtml = _templates.slice(0,6).map((tp,i) =>
    `<span class="template-pill" onclick="usarQfwTemplate(${i})">${tp.titulo}</span>`
  ).join('');
  window._qfwTemplates = _templates.slice(0,6);

  const popup = document.createElement('div');
  popup.className = 'qfw-popup';
  popup.id = 'qfw-popup';
  popup.onclick = e => { if(e.target===popup) fecharQuickFollowup(); };
  popup.innerHTML = `
    <div class="qfw-card">
      <h4>💬 Follow-up — ${numero} · ${cliente}</h4>
      <div class="templates-row" style="margin-bottom:.75rem">${tplHtml}</div>
      <div style="margin-bottom:.75rem">
        <label class="field-label">Tipo</label>
        <select class="field-select" id="qfw-tipo">${optTipoFw}</select>
      </div>
      <div style="margin-bottom:.75rem">
        <label class="field-label">Texto *</label>
        <textarea class="field-textarea" id="qfw-texto" placeholder="Descreva o acompanhamento..." style="min-height:90px"></textarea>
      </div>
      <div style="margin-bottom:1rem">
        <label class="field-label">Próximo follow-up</label>
        <input type="date" class="field-input" id="qfw-proximo">
      </div>
      <div style="display:flex;gap:.5rem;justify-content:flex-end">
        <button class="btn btn-outline btn-sm" onclick="fecharQuickFollowup()">Cancelar</button>
        <button class="btn btn-primary btn-sm" onclick="salvarQuickFollowup(${ticketId})">Salvar</button>
      </div>
    </div>`;
  document.body.appendChild(popup);
}

function usarQfwTemplate(i) {
  var tp = (window._qfwTemplates || [])[i];
  if (tp) document.getElementById('qfw-texto').value = tp.texto.split('\n').join(' ');
}

function abrirTicketDeAtraso_id(idDoc) {
  var d = (window._dadosAtrasos || []).find(function(x){return x.id_doc == idDoc;});
  if (d) abrirTicketDeAtraso(d);
}

function fecharQuickFollowup() {
  document.getElementById('qfw-popup')?.remove();
}

async function salvarQuickFollowup(ticketId) {
  const texto = document.getElementById('qfw-texto').value.trim();
  const tipo  = document.getElementById('qfw-tipo').value;
  const prox  = document.getElementById('qfw-proximo').value;
  if (!texto) { toast('Digite o texto do follow-up','error'); return; }
  try {
    await supaPost('ops_followups', { ticket_id:ticketId, tipo, texto, responsavel_nome:currentUser.nome });
    if (prox) await supaPatch('ops_tickets', ticketId, { proximo_followup: prox });
    fecharQuickFollowup();
    toast('Follow-up salvo!','success');
    // Atualiza ultimo_followup_em local
    const t = todosTickets.find(x=>x.id===ticketId);
    if (t) { t.ultimo_followup_em = new Date().toISOString(); t.qtd_followups = (t.qtd_followups||0)+1; if(prox) t.proximo_followup = prox; }
    renderListaTickets();
  } catch(e) { toast('Erro: '+e.message,'error'); }
}

// ============================================================
// BUSCA CLIENTE ERP
// ============================================================
let _clienteTimer = null;
async function buscarClienteERP(q) {
  const drop = document.getElementById('drop-cliente');
  if (!q || q.length < 3) { drop.style.display='none'; return; }
  clearTimeout(_clienteTimer);
  _clienteTimer = setTimeout(async () => {
    try {
      const isDoc = /[0-9.\/\-]/.test(q) && q.replace(/\D/g,'').length >= 6;
      let query = isDoc
        ? `cnpj=ilike.*${q.replace(/\D/g,'')}*&select=id_cliente,nome_cliente,cnpj,cidade,uf&limit=8`
        : `nome_cliente=ilike.*${encodeURIComponent(q)}*&select=id_cliente,nome_cliente,cnpj,cidade,uf&limit=8`;
      const r = await fetch(`${SUPA_URL}/rest/v1/vw_dim_cliente?${query}&limit=8`, {
        headers: { apikey: SUPA_KEY, Authorization: 'Bearer '+(currentSession?.access_token||SUPA_KEY) }
      });
      const dados = await r.json();
      if (!dados.length) {
        drop.innerHTML = '<div style="padding:.5rem .75rem;font-size:.78rem;color:var(--text2)">Nenhum cliente encontrado — digite o nome manualmente</div>';
      } else {
        drop.innerHTML = dados.map(c => `
          <div onclick="selecionarCliente('${c.id_cliente}','${(c.nome_cliente||'').replace(/'/g,"\'")}','${c.cnpj||''}')"
            style="padding:.5rem .75rem;cursor:pointer;font-size:.82rem;border-bottom:1px solid var(--border)"
            onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background=''">
            <div style="font-weight:500">${c.nome_cliente||''}</div>
            <div style="font-size:.72rem;color:var(--text2)">${c.cnpj||''} · ${c.cidade||''} ${c.uf||''}</div>
          </div>`).join('');
      }
      drop.style.display = 'block';
    } catch(e) { console.error(e); }
  }, 350);
}

function selecionarCliente(id, nome, cnpj) {
  document.getElementById('nt-cliente').value = nome;
  document.getElementById('nt-cliente-id').value = id;
  document.getElementById('drop-cliente').style.display = 'none';
}
function fecharDropCliente() {
  const d = document.getElementById('drop-cliente');
  if (d) d.style.display = 'none';
}

// ============================================================
// INIT
// ============================================================
iniciar();
</script>
